services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golang_vs_api_demo_api
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://todo:todo@postgres:5432/todo?sslmode=disable
      LOG_LEVEL: info
      APP_ENV: local
      MIGRATIONS_DIR: /migrations
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: golang_vs_api_demo_postgres
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
